services:
  llamacpp:
    image: ${LLAMACPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    container_name: ${LLAMACPP_CONTAINER_NAME:-hexe-ai-node-llamacpp}
    restart: unless-stopped
    gpus: all
    volumes:
      - ${LLAMACPP_MODEL_DIR:-./runtime/models/llamacpp}:/models:ro
      - ${LLAMACPP_SOCKET_DIR:-/run/hexe/ai-node}:/run/hexe/ai-node
    command:
      - --hf
      - ${LLAMACPP_MODEL_HF:-Qwen/Qwen3-8B-GGUF:Q4_K_M}
      - --alias
      - ${LLAMACPP_MODEL_ALIAS:-qwen3-8b-q4_k_m}
      - --host
      - ${LLAMACPP_SOCKET_PATH:-/run/hexe/ai-node/llamacpp.sock}
      - --ctx-size
      - ${LLAMACPP_CTX_SIZE:-4096}
      - --n-gpu-layers
      - ${LLAMACPP_N_GPU_LAYERS:-99}
      - --parallel
      - ${LLAMACPP_PARALLEL:-1}
    healthcheck:
      test:
        - CMD-SHELL
        - test -S ${LLAMACPP_SOCKET_PATH:-/run/hexe/ai-node/llamacpp.sock}
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
